name: Publish snapshot on Github artifacts

on:
  pull_request:
    branches: [ "main" ]
    types:
      - opened
      - synchronize
      - closed

permissions:
  packages: write
  pull-requests: write

jobs:
  publish_snapshot:
    name: Publish snapshot
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 #v3
      - uses: ./.github/actions/publish-snapshot
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch_name: ${{ github.head_ref }}

  cleanup_snapshot:
    name: Delete snapshot on PR close
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    permissions:
      packages: write
      pull-requests: write

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 #v3
      - name: Compute snapshot version to delete
        shell: bash
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          BRANCH=$(echo "${BRANCH_NAME}" | sed 's/[^a-zA-Z0-9-]/-/g')
          PREFIX_VERSION="${CURRENT_VERSION}-${BRANCH}-SNAPSHOT"
          echo "PREFIX_VERSION=${PREFIX_VERSION}" >> $GITHUB_ENV
      - name: Delete snapshot package versions
        uses: actions/github-script@d556feaca394842dc55e4734bf3bb9f685482fa0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const snapshotVersionDelete = process.env.PREFIX_VERSION;
            core.info(`Deleting snapshot: ${snapshotVersionDelete}`);
            try {
              const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
                package_type: 'maven',
                package_name: 'pagopa-ecommerce-commons',
                org: context.repo.owner
              });
              const toDelete = versions.data.filter(v => v.name.startsWith(snapshotVersionDelete));
              core.info(`Found ${toDelete.length} versions to delete`);
              for (const version of toDelete) {
                core.info(`Deleting: ${version.name} (${version.id})`);
                await github.rest.packages.deletePackageVersionForOrg({
                  package_type: 'maven',
                  package_name: 'pagopa-ecommerce-commons',
                  org: context.repo.owner,
                  package_version_id: version.id
                });
              }
            } catch (e) {
              core.info(`No versions found, skipping: ${e.message}`);
            }