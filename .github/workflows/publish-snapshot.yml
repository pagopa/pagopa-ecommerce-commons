name: Publish SNAPSHOT artifact

on:
  push:
    branches:
      - develop
      - 'feature/**'
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  publish_snapshot:
    name: Publish SNAPSHOT
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1

      - name: Publish SNAPSHOT artifact
        id: publish
        uses: ./.github/actions/publish-maven-snapshot
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write job summary
        shell: bash
        run: |
          echo "## SNAPSHOT Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.publish.outputs.snapshot_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`https://maven.pkg.github.com/pagopa/pagopa-ecommerce-commons\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### How to use this SNAPSHOT" >> $GITHUB_STEP_SUMMARY
          echo "Add this to your \`pom.xml\`:" >> $GITHUB_STEP_SUMMARY
          echo '```xml' >> $GITHUB_STEP_SUMMARY
          echo "<dependency>" >> $GITHUB_STEP_SUMMARY
          echo "    <groupId>it.pagopa</groupId>" >> $GITHUB_STEP_SUMMARY
          echo "    <artifactId>pagopa-ecommerce-commons</artifactId>" >> $GITHUB_STEP_SUMMARY
          echo "    <version>${{ steps.publish.outputs.snapshot_version }}</version>" >> $GITHUB_STEP_SUMMARY
          echo "</dependency>" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY