name: Deploy maven snapshot artifacts
description: "Build and deploy maven SNAPSHOT artifacts to github packages"

inputs:
  github_token:
    required: true
    description: The github token used to publish artifact
  branch_name:
    required: false
    description: "Branch name override (optional, defaults to GITHUB_REF)"
    default: ""

outputs:
  snapshot_version:
    description: "The SNAPSHOT version that was published"
    value: ${{ steps.branch_version.outputs.final_version }}

runs:
  using: "composite"
  steps:
    - name: Checkout branch
      uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      with:
        token: ${{ inputs.github_token }}

    - name: Set up JDK 21
      uses: actions/setup-java@0ab4596768b603586c0de567f2430c30f5b0d2b0 # v3
      with:
        java-version: '21'
        distribution: 'corretto'

    - name: Cache Maven packages
      uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Validate SNAPSHOT version
      id: get_version
      shell: bash
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "Version found in pom.xml: $VERSION"
        if [[ "$VERSION" != *"-SNAPSHOT" ]]; then
          echo "ERROR: version '$VERSION' is not a SNAPSHOT version"
          exit 1
        fi
        echo "Valid SNAPSHOT version: $VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Set branch-qualified SNAPSHOT version
      id: branch_version
      shell: bash
      run: |
        if [ -n "${{ inputs.branch_name }}" ]; then
          RAW_BRANCH="${{ inputs.branch_name }}"
        else
          RAW_BRANCH="${GITHUB_REF#refs/heads/}"
        fi
        
        if [ "$RAW_BRANCH" = "develop" ]; then
          FINAL_VERSION="${{ steps.get_version.outputs.version }}"
          echo "Branch develop: keeping original version  $FINAL_VERSION"
        else
          BRANCH=$(echo "$RAW_BRANCH" \
            | sed 's/[^a-zA-Z0-9]/-/g' \
            | tr '[:upper:]' '[:lower:]')
        
          BASE=$(echo "${{ steps.get_version.outputs.version }}" \
            | sed 's/-SNAPSHOT//')
        
          FINAL_VERSION="${BASE}-${BRANCH}-SNAPSHOT"
          echo "Feature branch: qualified version → $FINAL_VERSION"
        
          mvn versions:set \
            -DnewVersion="$FINAL_VERSION" \
            -DgenerateBackupPoms=false
        fi
        
        echo "final_version=$FINAL_VERSION" >> $GITHUB_OUTPUT

    - name: Deploy SNAPSHOT to GitHub Package Registry
      shell: bash
      run: |
        if [ "$ACT" = "true" ]; then
          mkdir -p /tmp/local-maven-repo
          REPO="local::file:///tmp/local-maven-repo"
        else
          REPO="github::https://maven.pkg.github.com/pagopa/pagopa-ecommerce-commons"
        fi        
        mvn deploy \
          -DaltSnapshotDeploymentRepository="${REPO}" \
          -DskipTests \
          -Dspotless.check.skip=true
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}

    - name: Verify local deploy (act only)
      if: ${{ env.ACT == 'true' }}
      shell: bash
      run: |
        echo "=== Files deployed locally ==="
        find /tmp/local-maven-repo -name "*.jar" -o -name "*.pom" | sort