name: Deploy snapshot maven artifacts
description: "Build and deploy snapshot maven artifacts to github packages"

inputs:
  github_token:
    required: true
    description: The github token used to publish artifact
  branch_name:
    required: true
    description: The branch name used to generate snapshot version

runs:
  using: "composite"
  steps:
    - name: Checkout branch
      uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 #v3
      with:
        token: ${{ inputs.github_token }}
    - name: Set up JDK 21
      uses: actions/setup-java@0ab4596768b603586c0de567f2430c30f5b0d2b0 # v3
      with:
        java-version: '21'
        distribution: 'corretto'
    - name: Cache Maven packages
      uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    - name: Compute snapshot version
      shell: bash
      run: |
        CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "Current version: ${CURRENT_VERSION}"

        MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
        MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
        PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)

        NEXT_PATCH=$((PATCH + 1))

        BRANCH=$(echo "${{ inputs.branch_name }}" | sed 's/[^a-zA-Z0-9-]/-/g')

        SNAPSHOT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-${BRANCH}-SNAPSHOT"
        echo "Snapshot version: ${SNAPSHOT_VERSION}"
        echo "SNAPSHOT_VERSION=${SNAPSHOT_VERSION}" >> $GITHUB_ENV
    - name: Delete existing snapshot version
      uses: actions/github-script@d556feaca394842dc55e4734bf3bb9f685482fa0
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const snapshotVersion = process.env.SNAPSHOT_VERSION;
          core.info(`Looking for existing version: ${snapshotVersion}`);
          try {
            const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
              package_type: 'maven',
              package_name: 'pagopa-ecommerce-commons',
              org: context.repo.owner
            });
            const toDelete = versions.data.filter(v => v.name === snapshotVersion);
            core.info(`Found ${toDelete.length} versions to delete`);
            for (const version of toDelete) {
              core.info(`Deleting: ${version.name} (${version.id})`);
              await github.rest.packages.deletePackageVersionForOrg({
                package_type: 'maven',
                package_name: 'pagopa-ecommerce-commons',
                org: context.repo.owner,
                package_version_id: version.id
              });
            }
          } catch (e) {
            core.info(`No existing versions found, skipping delete: ${e.message}`);
          }
    - name: Set maven snapshot version
      shell: bash
      run: |
        mvn versions:set -DnewVersion="${SNAPSHOT_VERSION}" -DgenerateBackupPoms=false
    - name: Deploy snapshot to GitHub Package Registry
      shell: bash
      run: |
        REPO="github::https://maven.pkg.github.com/pagopa/pagopa-ecommerce-commons"
        mvn deploy -DaltReleaseDeploymentRepository="${REPO}"
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}